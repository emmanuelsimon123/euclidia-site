backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: images

collections:
  - name: products
    label: Shop Products
    folder: _products
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Standard, name: standard, widget: string, hint: "e.g. 8.EE.C.7b" }
      - { label: Grade Range, name: grade, widget: string, hint: "e.g. 6–8" }
      - { label: Price, name: price, widget: string, hint: "e.g. $2.25" }
      - { label: TPT Price, name: tpt_price, widget: string, hint: "e.g. $3.25 on TPT" }
      - { label: Description, name: description, widget: text }
      - { label: Gumroad Link, name: gumroad_url, widget: string }
      - { label: Thumbnail, name: thumbnail, widget: image, required: false }
      - { label: Tags, name: tags, widget: string, hint: "e.g. 6-8 equations 8-ee" }
      - { label: Free?, name: is_free, widget: boolean, default: false }
